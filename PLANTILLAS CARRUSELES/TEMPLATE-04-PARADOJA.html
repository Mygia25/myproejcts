<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Template 04 — Paradoja / Hook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; }

.slide {
  width:1080px; height:1350px;
  position:relative;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOP: full-bleed image with dark overlay */
.top {
  height:700px;
  position:relative;
  flex-shrink:0;
  overflow:hidden;
}

.top img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  filter:brightness(0.55) saturate(0.7);
}

/* Dark gradient on image */
.top-overlay {
  position:absolute;
  inset:0;
  background: linear-gradient(
    to bottom,
    rgba(61,43,36,.1) 0%,
    rgba(61,43,36,.5) 60%,
    rgba(61,43,36,.95) 100%
  );
}

/* Hook text on image */
.hook-wrap {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:0 80px 60px;
  z-index:3;
}

.hook-label {
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:5px;
  text-transform:uppercase;
  color:#D9C9E3;
  opacity:.7;
  margin-bottom:20px;
}

.hook {
  font-family:'Playfair Display',serif;
  font-size:90px;
  font-weight:700;
  line-height:.95;
  color:#F8F2EC;
}

.hook .highlight {
  font-style:italic;
  color:#D9C9E3;
}

/* CONNECTOR accent */
.connector {
  height:5px;
  background:linear-gradient(to right, #D9C9E3, #B0AEB0);
  flex-shrink:0;
}

/* BOTTOM: beige — insight */
.bottom {
  flex:1;
  background:#F8F2EC;
  padding: 52px 80px 60px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.reveal-tag {
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:28px;
}
.rev-line { width:36px; height:1px; background:#D9C9E3; }
.rev-label {
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#B0AEB0;
}

.insight {
  font-family:'Playfair Display',serif;
  font-size:42px;
  font-style:italic;
  color:#3D2B24;
  line-height:1.3;
  margin-bottom:24px;
}

.insight-body {
  font-family:'Montserrat',sans-serif;
  font-size:20px;
  font-weight:300;
  color:#806357;
  line-height:1.6;
}

/* bottom row */
.bot-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.handle {
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:#B0AEB0;
}

.swipe {
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#B0AEB0;
}
.arrow-line { width:32px; height:1px; background:#B0AEB0; position:relative; }
.arrow-line::after {
  content:'';
  position:absolute;
  right:0; top:-3px;
  width:7px; height:7px;
  border-top:1px solid #B0AEB0;
  border-right:1px solid #B0AEB0;
  transform:rotate(45deg);
}
</style>
</head>
<body>
<div class="slide">

  <!-- Top image with hook -->
  <div class="top">
    <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1080&q=85&fit=crop" alt="minimal nature">
    <div class="top-overlay"></div>
    <div class="hook-wrap">
      <p class="hook-label">Esto no se dice suficiente</p>
      <h1 class="hook">
        Más pantallas.<br>
        Más <span class="highlight">frustración.</span>
      </h1>
    </div>
  </div>

  <!-- Color connector -->
  <div class="connector"></div>

  <!-- Bottom insight -->
  <div class="bottom">
    <div>
      <div class="reveal-tag">
        <div class="rev-line"></div>
        <span class="rev-label">La verdad</span>
      </div>
      <p class="insight">"El aburrimiento no es el problema.<br>Es la puerta a la autorregulación."</p>
      <p class="insight-body">Un niño que sabe estar consigo mismo ya está aprendiendo algo que muchos adultos aún buscan. 🌱</p>
    </div>
    <div class="bot-row">
      <span class="handle">@ingridnunezpsi</span>
      <div class="swipe">desliza <div class="arrow-line"></div></div>
    </div>
  </div>

</div>
</body>
</html>
