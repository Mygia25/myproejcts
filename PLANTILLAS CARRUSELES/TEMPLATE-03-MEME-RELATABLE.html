<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Template 03 — Meme / Relatable</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1350px; overflow:hidden; }

.slide {
  width:1080px; height:1350px;
  background:#D9C9E3;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Big image top 55% */
.img-wrap {
  height:680px;
  position:relative;
  flex-shrink:0;
  overflow:hidden;
}

.img-wrap img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}

/* Subtle overlay on image */
.img-wrap::after {
  content:'';
  position:absolute;
  inset:0;
  background: linear-gradient(to bottom, transparent 60%, rgba(217,201,227,1) 100%);
}

/* Big emoji badge over image */
.emoji-badge {
  position:absolute;
  bottom:-30px;
  left:80px;
  z-index:5;
  font-size:100px;
  line-height:1;
  filter:drop-shadow(0 8px 20px rgba(61,43,36,.2));
}

/* Tag top-left */
.img-tag {
  position:absolute;
  top:40px;
  left:80px;
  z-index:5;
  background:rgba(248,242,236,.9);
  backdrop-filter:blur(8px);
  border-radius:100px;
  padding:10px 24px;
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#806357;
}

/* Slide num */
.img-tag-right {
  position:absolute;
  top:40px;
  right:80px;
  z-index:5;
  font-family:'Montserrat',sans-serif;
  font-size:12px;
  letter-spacing:3px;
  color:rgba(255,255,255,.7);
}

/* Bottom text area */
.bottom {
  flex:1;
  padding: 60px 80px 60px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* Main text */
.main-text {
  font-family:'Playfair Display',serif;
  font-size:76px;
  font-weight:700;
  line-height:1.05;
  color:#3D2B24;
  margin-bottom:24px;
}

.main-text em {
  font-style:italic;
  color:#806357;
}

/* Sub */
.sub {
  font-family:'Montserrat',sans-serif;
  font-size:22px;
  font-weight:300;
  color:#5C4A42;
  line-height:1.5;
  margin-bottom:44px;
}

/* CTA row */
.cta-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.cta-pill {
  background:#3D2B24;
  border-radius:100px;
  padding:18px 36px;
  font-family:'Montserrat',sans-serif;
  font-size:17px;
  font-weight:500;
  color:#F8F2EC;
  letter-spacing:.5px;
}

.handle {
  font-family:'Montserrat',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:#806357;
  opacity:.7;
}

/* Deco dots */
.dots {
  position:absolute;
  bottom:80px;
  right:80px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.dot { width:7px; height:7px; border-radius:50%; background:#806357; opacity:.2; }
</style>
</head>
<body>
<div class="slide">

  <div class="img-wrap">
    <img src="https://images.unsplash.com/photo-1476703993599-0035a21b17a9?w=1080&q=85&fit=crop&crop=top" alt="mother child">
    <span class="img-tag">¿Te reconoces?</span>
    <span class="img-tag-right">03/07</span>
    <div class="emoji-badge">😅</div>
  </div>

  <div class="bottom">
    <div>
      <h2 class="main-text">Antes de las 9am<br><em>ya viví</em> esto.</h2>
      <p class="sub">El vaso derramado. El zapato perdido.<br>"Tengo hambre" — 5 min después de comer. 🥲</p>
    </div>
    <div class="cta-row">
      <div class="cta-pill">¿Cuál fue la tuya hoy? 💬</div>
      <span class="handle">@ingridnunezpsi</span>
    </div>
  </div>

  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

</div>
</body>
</html>
